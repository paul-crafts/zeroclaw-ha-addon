name: "ZeroClaw"
description: "LLM-powered AI Assistant for Home Assistant. Run 'zc-onboard' in terminal to begin."
version: "0.2.2"
slug: "zeroclaw"
init: false
arch:
  - aarch64
  - amd64
  - armv7
map:
  - addon_config:rw
  - share:rw
options:
  config_dir: "/config"
schema:
  config_dir: "str"
ports:
  8080/tcp: 8080
  42617/tcp: 42617
webui: http://[HOST]:[PORT:42617]
